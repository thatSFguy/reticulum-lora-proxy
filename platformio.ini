; reticulum-lora-proxy
; --------------------
; Off-spec transparent LoRa mesh proxy. Promotes overheard HEADER_1
; packets to HEADER_2 with itself substituted as relay, rescuing
; weak-link transmissions in single-segment LoRa meshes where
; Reticulum's source-routed transport sits idle.
;
; Hardware glue carried over from ../reticulum-lora-transport (BLE,
; SerialConsole, Radio, Battery, Storage, Led, Config protocol). The
; new bit is src/rns/Proxy.{h,cpp} replacing the spec Transport.

[platformio]
default_envs = native

[env]
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
    -Wno-unknown-pragmas
    -Iinclude
    -Isrc

[env:native]
platform = native
test_framework = unity
test_filter = native/*
build_flags =
    ${env.build_flags}
    -DNATIVE_BUILD
    -Isupport/native_compat
build_src_filter =
    +<*>
    -<main.cpp>
    -<Radio.cpp>
    -<Storage.cpp>
    -<ConfigStore.cpp>
    -<Led.cpp>
    -<Battery.cpp>
    -<SerialConsole.cpp>
    -<Ble.cpp>
lib_deps =
    rweather/Crypto @ ^0.4.0
lib_compat_mode = off
test_build_src = true

[env:native_san]
extends = env:native
build_flags =
    ${env:native.build_flags}
    -fsanitize=address,undefined
    -fno-omit-frame-pointer
    -g

[nrf52_common]
platform = nordicnrf52
framework = arduino
board_build.partitions = no_ota.csv
board_build.filesystem = littlefs
upload_protocol = nrfutil
monitor_speed = 115200
build_unflags =
    ${env.build_unflags}
    -fno-exceptions
    -fno-rtti
    --specs=nano.specs
build_flags =
    ${env.build_flags}
    -fexceptions
    -frtti
    --specs=nosys.specs
lib_deps =
    rweather/Crypto @ ^0.4.0
    jgromes/RadioLib @ ^7.3.0
extra_scripts = pre:scripts/inject_fw_version.py

[env:ProMicroDIY]
extends = nrf52_common
board = nrf52840_dk_adafruit
build_flags =
    ${nrf52_common.build_flags}
    -DBOARD_MODEL=BOARD_ProMicroDIY
    -include include/board/ProMicroDIY.h

[env:RAK4631]
extends = nrf52_common
board = nrf52840_dk_adafruit
build_flags =
    ${nrf52_common.build_flags}
    -DBOARD_MODEL=BOARD_RAK4631
    -include include/board/rak4631.h

[env:XIAO_nRF52840]
extends = nrf52_common
board = xiao_nrf52840
build_flags =
    ${nrf52_common.build_flags}
    -DBOARD_MODEL=BOARD_XIAO_NRF52840
    -include include/board/xiao_nrf52840.h
    -Llinker
